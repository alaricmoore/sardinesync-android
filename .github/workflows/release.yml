# GitHub Actions workflow: build both signed release APKs on GitHub's servers.
#
# How to cut a release:   git tag v0.3 && git push origin v0.3
# That's it — this file does the rest. A few minutes later both APKs appear at
# https://github.com/alaricmoore/sardinesync-android/releases
#
# Two apps are built from this one repo (see notes/local-mode-plan.md):
#   • sardinesync   (:app)      — the companion: syncs to YOUR OWN server.
#   • sardinetracker (:applocal) — local mode: the whole server runs on-phone
#                                  (Chaquopy-embedded Python). Bigger APK.
# They install side by side (different package ids) and both attach to the
# same release.
#
# The signing secrets (keystore + passwords) are NOT in this file or the repo.
# They live in the repo's encrypted secret store (Settings → Secrets → Actions)
# and are injected at build time. Anyone can read this file; only the build
# runner can read the secrets.

name: Release APKs

# "on" = which events wake this workflow up.
on:
  push:
    tags: ["v*"]        # any tag starting with v, e.g. v0.3
  workflow_dispatch:     # also adds a manual "Run workflow" button in the
                         # Actions tab — a dry run that builds the APKs but
                         # skips the release step (see the `if:` below).

# The workflow authenticates as a robot user with minimal rights.
# Creating a release counts as writing to the repo, so ask for that.
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest    # a fresh throwaway Linux VM, free for public repos

    steps:
      # Each step runs in order on that VM. `uses:` runs a prepackaged action
      # (someone else's reusable step); `run:` runs shell commands.

      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Install JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin   # a well-maintained OpenJDK build
          java-version: "21"      # AGP does not yet run under JDK 25

      # The local app embeds CPython via Chaquopy, which needs a matching
      # Python on the BUILD machine (buildPython). 3.10 is the version whose
      # native wheels (scipy etc.) Chaquopy fully ships — see applocal's
      # build.gradle.kts. The companion app doesn't use this.
      - name: Install Python 3.10 (Chaquopy buildPython)
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # Chaquopy looks for `python3.10` on PATH. setup-python guarantees
      # `python`/`python3`; this symlink guarantees the versioned name too.
      - name: Ensure python3.10 is on PATH
        run: |
          if ! command -v python3.10 >/dev/null; then
            ln -s "$(command -v python)" "$HOME/.local/bin/python3.10"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      # Caches Gradle downloads between runs so builds take ~2 min, not ~6.
      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      # Recreate exactly what a local release build expects: the keystore file
      # and a keystore.properties in EACH app module pointing at it. The
      # keystore is stored as one long base64 string because secrets can only
      # hold text, not files. $RUNNER_TEMP is a scratch dir wiped when the job
      # ends. Both modules share one keystore, so both apps are signed with the
      # same key.
      - name: Reconstruct signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          printf '%s' "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.jks"
          for module in app applocal; do
            {
              printf 'storeFile=%s\n'     "$RUNNER_TEMP/release.jks"
              printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
              printf 'keyAlias=%s\n'      "$KEY_ALIAS"
              printf 'keyPassword=%s\n'   "$KEY_PASSWORD"
            } > "$module/keystore.properties"
          done

      - name: Build both signed release APKs
        run: ./gradlew :app:assembleRelease :applocal:assembleRelease

      # Give each APK a name that says what it is. GITHUB_REF_NAME is the tag
      # (v0.3) on tag builds, or the branch (main) on manual dry runs.
      - name: Name the APKs
        run: |
          if [[ "$GITHUB_REF_NAME" == v* ]]; then
            suffix="$GITHUB_REF_NAME"
          else
            suffix="dev"
          fi
          companion="sardinesync-$suffix.apk"
          local="sardinetracker-local-$suffix.apk"
          cp app/build/outputs/apk/release/app-release.apk "$companion"
          cp applocal/build/outputs/apk/release/applocal-release.apk "$local"
          echo "COMPANION_APK=$companion" >> "$GITHUB_ENV"
          echo "LOCAL_APK=$local" >> "$GITHUB_ENV"

      # Always attach both APKs to the workflow run itself (visible in the
      # Actions tab for 90 days) — this is what a manual dry run produces.
      - name: Upload APKs as build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: apks-${{ github.ref_name }}
          path: |
            ${{ env.COMPANION_APK }}
            ${{ env.LOCAL_APK }}

      # Only on real tags: create the public Release with both APKs attached.
      # `gh` is preinstalled on the runner; github.token is a short-lived
      # credential GitHub mints for this run automatically.
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" "$COMPANION_APK" "$LOCAL_APK" \
            --title "SardineSync $GITHUB_REF_NAME" \
            --generate-notes
